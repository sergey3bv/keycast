steps:
  # Build the Docker image
  # Note: VITE_DOMAIN and VITE_ALLOWED_PUBKEYS are injected at runtime via APP_URL and ALLOWED_PUBKEYS env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'BUILD_VERSION=${BUILD_ID}'
      - '-t'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/docker/keycast:latest'
      - '.'
    timeout: 1200s

  # Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/${PROJECT_ID}/docker/keycast:latest'

  # Run database migrations via the keycast-migrate Cloud Run Job.
  # Runs AFTER build+push so the job pulls the freshly-pushed :latest, ensuring
  # its embedded migrations match what the new Cloud Run revision will run.
  # The job runs ./keycast --migrate (sqlx::migrate!) as service account
  # keycast-migrator@openvine-co.iam.gsa.com, connecting to keycast-db-plus via
  # Cloud SQL Auth Proxy + IAM auth. sqlx tracks applied versions in the
  # _sqlx_migrations table and uses an advisory lock; safe to invoke on every
  # deploy. --wait blocks until the execution completes; non-zero exit fails
  # this step, which prevents the deploy step from running with stale schema.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'run-migrations'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'keycast-migrate'
      - '--region=us-central1'
      - '--project=openvine-co'
      - '--wait'

  # Deploy to Cloud Run with hashring-enabled horizontal scaling
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'deploy'
      - 'keycast'
      - '--image=us-central1-docker.pkg.dev/${PROJECT_ID}/docker/keycast:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--cpu=4'
      - '--memory=4Gi'
      - '--timeout=300'
      - '--min-instances=3'
      - '--max-instances=200'
      - '--concurrency=50'
      - '--no-cpu-throttling'
      - '--execution-environment=gen2'
      - '--cpu-boost'
      - '--session-affinity'
      - '--use-http2'
      - '--startup-probe=httpGet.path=/healthz/startup,httpGet.port=3000,initialDelaySeconds=0,periodSeconds=3,failureThreshold=20,timeoutSeconds=2'
      - '--liveness-probe=httpGet.path=/livez,httpGet.port=3000,periodSeconds=30,timeoutSeconds=5,failureThreshold=3'
      - '--add-cloudsql-instances=openvine-co:us-central1:keycast-db-plus'
      - '--network=default'
      - '--subnet=default'
      - '--vpc-egress=private-ranges-only'
      - '--set-secrets=DATABASE_URL=keycast-database-url:latest,SERVER_NSEC=keycast-ucan-secret:latest,SENDGRID_API_KEY=keycast-sendgrid-api-key:latest,REDIS_URL=keycast-redis-url:latest,KEYCAST_SERVICE_TOKEN=keycast-service-token:latest'
      - '--set-env-vars=^;^NODE_ENV=production;USE_GCP_KMS=true;GCP_PROJECT_ID=${PROJECT_ID};ALLOWED_ORIGINS=https://login.divine.video,https://divine.video,https://*.openvine-app.pages.dev;ALLOWED_TENANT_DOMAINS=login.divine.video;REQUIRE_REGISTERED_OAUTH_CLIENTS=false;APP_URL=https://login.divine.video;FROM_EMAIL=noreply@divine.video;RUST_LOG=info;ENABLE_EXAMPLES=true;SQLX_STATEMENT_CACHE=100;SQLX_POOL_SIZE=50;ALLOWED_PUBKEYS=89ef92b9ebe6dc1e4ea398f6477f227e95429627b0a33dc89b640e137b256be5,76c71aae3a491f1d9eec47cba17e229cda4113a0bbb6e6ae1776d7643e29cafa;BUNKER_RELAYS=wss://relay.divine.video,wss://relay.primal.net,wss://relay.nsec.app,wss://nos.lol;ENABLE_DIVINE_NAMES=true'

  # Smoke tests - verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "⏳ Waiting for service to be ready..."
        sleep 30

        SERVICE_URL=$$(gcloud run services describe keycast --region=us-central1 --format='value(status.url)')
        echo "Service URL: $$SERVICE_URL"

        echo "🔍 Testing API readiness endpoint..."
        if ! curl -f -s "$$SERVICE_URL/healthz/ready"; then
          echo "❌ Readiness check failed"
          exit 1
        fi
        echo "✅ Readiness check passed"

        PREVIEW_ORIGIN="https://preview.openvine-app.pages.dev"
        HEADLESS_PUBLIC_ORIGIN="https://keycast-cors-smoke.invalid"

        # Helper: verify the Access-Control-Allow-Origin header from a CORS preflight.
        # Retries to ride out the brief warm-up window where requests can still land
        # on the previous revision after Cloud Run reports 100% traffic on the new one.
        # Args: endpoint path, request Origin, expected allow-origin.
        # Prints the observed allow-origin value once it matches the expected value.
        cors_preflight_expect_allow_origin() {
          local path="$$1"
          local origin="$$2"
          local expected_allow_origin="$$3"
          local headers
          local allow_origin=""
          for attempt in 1 2 3 4 5 6; do
            allow_origin=""
            headers=$$(mktemp)
            local http_code
            http_code=$$(curl -s -D "$$headers" -o /dev/null -w "%{http_code}" \
              -H "Origin: $$origin" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: Content-Type" \
              -X OPTIONS \
              "$$SERVICE_URL$$path")
            if [ "$$http_code" = "200" ]; then
              # grep -i is POSIX (case-insensitive line match). awk's
              # IGNORECASE is a gawk extension and the cloud-sdk image ships
              # mawk, which silently ignores it. HTTP/2 emits header names in
              # lowercase, so a case-sensitive awk regex would never match
              # access-control-allow-origin and the parsed value would always
              # be empty (every retry returns ''), making this whole loop
              # silently useless.
              allow_origin=$$(grep -i '^Access-Control-Allow-Origin:' "$$headers" | awk '{print $$2}' | tr -d '\r')
              if [ "$$allow_origin" = "$$expected_allow_origin" ]; then
                rm -f "$$headers"
                echo "$$allow_origin"
                return 0
              fi
            fi
            echo "  attempt $$attempt: http=$$http_code origin='$$origin' allow_origin='$$allow_origin' expected='$$expected_allow_origin', retrying in 10s..." >&2
            if [ "$$attempt" = "6" ]; then
              # Final retry exhausted; dump the last response's headers so
              # a post-mortem doesn't need to re-run a deploy to see what
              # the server actually sent.
              echo "  final response headers from attempt 6:" >&2
              sed 's/^/    /' "$$headers" >&2
            fi
            rm -f "$$headers"
            sleep 10
          done
          echo "$$allow_origin"
          return 1
        }

        echo "🔍 Testing CORS preflight for /api/auth/register from $$PREVIEW_ORIGIN..."
        # /api/auth/register uses the predicate-based CORS (auth_cors) and echoes the
        # specific request origin back when allowed.
        REGISTER_ALLOW_ORIGIN=$$(cors_preflight_expect_allow_origin "/api/auth/register" "$$PREVIEW_ORIGIN" "$$PREVIEW_ORIGIN")
        if [ "$$REGISTER_ALLOW_ORIGIN" != "$$PREVIEW_ORIGIN" ]; then
          echo "❌ Register CORS preflight returned Access-Control-Allow-Origin='$$REGISTER_ALLOW_ORIGIN' (expected '$$PREVIEW_ORIGIN')"
          exit 1
        fi
        echo "✅ Register CORS preflight passed"

        echo "🔍 Testing CORS preflight for /api/headless/login from $$HEADLESS_PUBLIC_ORIGIN..."
        # /api/headless/login uses public_cors (allow_origin = Any) so the server
        # responds with '*' for arbitrary origins. Using an unallowlisted origin here
        # ensures a regression back to auth_cors cannot pass by echoing PREVIEW_ORIGIN.
        LOGIN_ALLOW_ORIGIN=$$(cors_preflight_expect_allow_origin "/api/headless/login" "$$HEADLESS_PUBLIC_ORIGIN" "*")
        if [ "$$LOGIN_ALLOW_ORIGIN" != "*" ]; then
          echo "❌ Headless login CORS preflight returned Access-Control-Allow-Origin='$$LOGIN_ALLOW_ORIGIN' (expected '*')"
          exit 1
        fi
        echo "✅ Headless login CORS preflight passed (allow-origin='$$LOGIN_ALLOW_ORIGIN')"

        echo "🎉 All smoke tests passed!"

images:
  - 'us-central1-docker.pkg.dev/${PROJECT_ID}/docker/keycast:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 2400s
