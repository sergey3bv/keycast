# Builds once, pushes to all GCP Artifact Registry environments via docker-push-gcp.
# Production push only on version tags (v*). Dispatch to IAC repo triggers ArgoCD sync.
#
# Required GitHub Variables (repo-level):
#   Per environment: WORKLOAD_IDENTITY_PROVIDER_{ENV}, SERVICE_ACCOUNT_{ENV}, GCP_PROJECT_ID_{ENV}
#
# Required GitHub Secrets (staging environment):
#   CORECONFIG_DISPATCH_APP_ID, CORECONFIG_DISPATCH_APP_PRIVATE_KEY

name: Build, Test & Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_production:
        description: 'Also push to production registry'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  GCP_REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keycast_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 16379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Setup test environment
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          PGPASSWORD: postgres
        run: |
          # Generate master key
          chmod +x scripts/generate_key.sh
          ./scripts/generate_key.sh

          # Run migrations
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run --database-url $DATABASE_URL --source database/migrations

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          REDIS_URL: redis://localhost:16379
          TEST_REDIS_URL: redis://localhost:16379
        run: |
          cargo test --workspace --verbose
          cargo test -p keycast_core --features integration-tests --lib --verbose
          cargo test -p keycast_core --features aws --lib --verbose
          cargo test -p keycast_api --features integration-tests --lib --tests --verbose
          cargo test -p keycast_signer --features integration-tests --lib --tests --verbose
          cargo test -p keycast --features aws --bin keycast --verbose
          cargo test -p cluster-hashring --lib -- --ignored

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Check formatting
        run: cargo fmt --all -- --check

  docker:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
      packages: write
    outputs:
      tags: ${{ steps.tags.outputs.tags }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        uses: divinevideo/divine-github-actions/generate-docker-tags@v1

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: keycast:local
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to POC
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_POC }}
          service-account: ${{ vars.SERVICE_ACCOUNT_POC }}
          project-id: ${{ vars.GCP_PROJECT_ID_POC }}
          repository: containers-poc
          region: ${{ env.GCP_REGION }}

      - name: Push to Test
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_TEST }}
          service-account: ${{ vars.SERVICE_ACCOUNT_TEST }}
          project-id: ${{ vars.GCP_PROJECT_ID_TEST }}
          repository: containers-test
          region: ${{ env.GCP_REGION }}

      - name: Push to Staging
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_STAGING }}
          service-account: ${{ vars.SERVICE_ACCOUNT_STAGING }}
          project-id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          repository: containers-staging
          region: ${{ env.GCP_REGION }}

      - name: Push to Production
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.include_production)
        uses: divinevideo/divine-github-actions/docker-push-gcp@v1
        with:
          image-name: keycast:local
          registry-image: keycast
          tags: ${{ steps.tags.outputs.tags }}
          wif-provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service-account: ${{ vars.SERVICE_ACCOUNT_PRODUCTION }}
          project-id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          repository: containers-production
          region: ${{ env.GCP_REGION }}

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** keycast" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.tags.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environments:**" >> $GITHUB_STEP_SUMMARY
          echo "- POC: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_POC }}/containers-poc/keycast\`" >> $GITHUB_STEP_SUMMARY
          echo "- Test: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_TEST }}/containers-test/keycast\`" >> $GITHUB_STEP_SUMMARY
          echo "- Staging: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/containers-staging/keycast\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo "- Production: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/containers-production/keycast\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR (public)
        continue-on-error: true
        run: |
          GHCR_IMAGE="ghcr.io/divinevideo/keycast"
          docker tag keycast:local "${GHCR_IMAGE}:latest"
          docker tag keycast:local "${GHCR_IMAGE}:${{ github.sha }}"
          docker push "${GHCR_IMAGE}:latest"
          docker push "${GHCR_IMAGE}:${{ github.sha }}"

  deploy:
    name: Trigger Deploy
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: staging

    steps:
      - name: Determine environments
        id: envs
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ inputs.include_production }}" == "true" ]]; then
            echo 'environments=["poc","staging","production"]' >> $GITHUB_OUTPUT
          else
            echo 'environments=["poc","staging"]' >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Trigger image deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cat <<EOF | gh api repos/divinevideo/divine-iac-coreconfig/dispatches --input -
          {
            "event_type": "image-deploy",
            "client_payload": {
              "application": "keycast",
              "environments": ${{ steps.envs.outputs.environments }},
              "images": [{"name": "keycast", "tag": "${SHORT_SHA}"}],
              "source_repo": "${{ github.repository }}",
              "source_sha": "${SHORT_SHA}",
              "source_ref": "${{ github.ref_name }}"
            }
          }
          EOF

          echo "## Deploy Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | keycast |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${SHORT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environments | ${{ steps.envs.outputs.environments }} |" >> $GITHUB_STEP_SUMMARY
