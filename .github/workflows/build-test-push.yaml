# ABOUTME: GitHub Actions workflow for building, testing, and pushing Docker images to GCP Artifact Registry
# ABOUTME: Uses Workload Identity Federation for secure keyless authentication with GCP
#
# Required GitHub Secrets (configured in 'poc' environment):
#   - GCP_PROJECT_ID: GCP project ID
#   - GCP_PROJECT_NUMBER: GCP project number (numeric)
#   - GCP_SERVICE_ACCOUNT: Service account email for Workload Identity
#   - GCP_WORKLOAD_IDENTITY_POOL: Workload Identity pool name
#   - GCP_WORKLOAD_IDENTITY_PROVIDER: Workload Identity provider name
#   - GCP_ARTIFACT_REGISTRY: Artifact Registry hostname (e.g., us-central1-docker.pkg.dev)
#   - GCP_ARTIFACT_REPOSITORY: Repository path within project (e.g., docker/keycast)
#
# Required GitHub Secrets (organization level, for coreconfig dispatch):
#   - CORECONFIG_DISPATCH_APP_ID: GitHub App ID for cross-repo dispatch
#   - CORECONFIG_DISPATCH_APP_PRIVATE_KEY: GitHub App private key
#
# GitHub Environments (configure at: Settings → Environments):
#   - poc: Used for build-push job (GCP secrets for building Docker images)
#   - staging: Used for dev deployments (poc, test, staging environments)
#   - production: Used for production deployments (requires approval if protection rules enabled)
#
# See .github/ENVIRONMENT_SETUP.md for complete setup instructions
#
# Recommended: Add protection rules to 'production' environment:
#   - Required reviewers (1+)
#   - Wait timer (optional, e.g., 5 minutes)
#   - Deployment branches: restrict to tags matching 'v*'

name: Build, Test & Push

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'  # Deploy to production on version tags (e.g., v1.0.0)
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # Allow manual triggering for testing
    inputs:
      deploy_environment:
        description: 'Environment to deploy to (poc, test, staging, production, or "all" for all dev environments)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - poc
          - test
          - staging
          - production

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keycast_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Setup test environment
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          PGPASSWORD: postgres
        run: |
          # Generate master key
          chmod +x scripts/generate_key.sh
          ./scripts/generate_key.sh

          # Run migrations
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx migrate run --database-url $DATABASE_URL --source database/migrations

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keycast_test
          REDIS_URL: redis://localhost:6379
        run: cargo test --workspace --verbose

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-push:
    needs: test
    runs-on: ubuntu-latest
    environment: poc  # Use 'poc' environment secrets
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WORKLOAD_IDENTITY_POOL }}/providers/${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tags
        run: |
          FULL_IMAGE="${{ secrets.GCP_ARTIFACT_REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}"
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tags=${FULL_IMAGE}:pr-${{ github.event.pull_request.number }}-ci" >> $GITHUB_OUTPUT
          else
            echo "tags=${FULL_IMAGE}:latest,${FULL_IMAGE}:${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy via coreconfig
  # - poc, test, staging: manual dispatch only (uses 'staging' environment)
  # - production: on version tags (v*) or manual dispatch (uses 'production' environment)
  dispatch-dev:
    name: Deploy to Dev Environments
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment != 'production'
    environment: staging  # Use staging environment for non-production deployments

    steps:
      - name: Determine target environments
        id: envs
        run: |
          DEPLOY_ENV="${{ github.event.inputs.deploy_environment }}"
          if [ "$DEPLOY_ENV" == "all" ]; then
            echo "environments=[\"poc\",\"test\",\"staging\"]" >> $GITHUB_OUTPUT
            echo "env_display=poc, test, staging" >> $GITHUB_OUTPUT
          else
            echo "environments=[\"$DEPLOY_ENV\"]" >> $GITHUB_OUTPUT
            echo "env_display=$DEPLOY_ENV" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Dispatch image deploy to coreconfig
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/divinevideo/divine-iac-coreconfig/dispatches \
            -f event_type=image-deploy \
            -f 'client_payload[application]=keycast' \
            -f "client_payload[environments]=${{ steps.envs.outputs.environments }}" \
            -f "client_payload[images]=[{\"name\":\"keycast\",\"tag\":\"${{ github.sha }}\"}]" \
            -f "client_payload[source_repo]=${{ github.repository }}" \
            -f "client_payload[source_sha]=${{ github.sha }}" \
            -f "client_payload[source_ref]=${{ github.ref_name }}"
          
          echo "## 🚀 Deploy Dispatched to Dev Environments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | keycast |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environments | ${{ steps.envs.outputs.env_display }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | [divine-iac-coreconfig](https://github.com/divinevideo/divine-iac-coreconfig/actions) |" >> $GITHUB_STEP_SUMMARY

  dispatch-production:
    name: Deploy to Production
    needs: build-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'production')
    environment: production  # Uses production environment with protection rules

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORECONFIG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CORECONFIG_DISPATCH_APP_PRIVATE_KEY }}
          owner: divinevideo
          repositories: divine-iac-coreconfig

      - name: Dispatch image deploy to coreconfig
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/divinevideo/divine-iac-coreconfig/dispatches \
            -f event_type=image-deploy \
            -f 'client_payload[application]=keycast' \
            -f 'client_payload[environments]=["production"]' \
            -f "client_payload[images]=[{\"name\":\"keycast\",\"tag\":\"${{ github.sha }}\"}]" \
            -f "client_payload[source_repo]=${{ github.repository }}" \
            -f "client_payload[source_sha]=${{ github.sha }}" \
            -f "client_payload[source_ref]=${{ github.ref_name }}"
          
          echo "## 🚀 Deploy Dispatched to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Application | keycast |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | [divine-iac-coreconfig](https://github.com/divinevideo/divine-iac-coreconfig/actions) |" >> $GITHUB_STEP_SUMMARY
